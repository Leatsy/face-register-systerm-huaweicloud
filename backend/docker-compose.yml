services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://repo.huaweicloud.com/repository/pypi/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-repo.huaweicloud.com}
        PIP_EXTRA_ARGS: ${PIP_EXTRA_ARGS:---prefer-binary}
    container_name: cloud-proj-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./.insightface:/app/.insightface
    restart: unless-stopped
